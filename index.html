<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Meadow 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e8f4f0;
    --grass: #a8d8a8;
    --soil: #c4a882;
    --petal-a: #f9b4c8;
    --petal-b: #b5d8f7;
    --petal-c: #ffd6a5;
    --petal-d: #c3b1e1;
    --stem: #5a8a5a;
    --ui-bg: rgba(255,255,255,0.82);
    --ui-border: rgba(180,200,180,0.5);
    --text: #4a6741;
    --accent: #7db87d;
    --shadow: rgba(100,150,100,0.18);
    --font-main: 'Nunito', sans-serif;
    --font-hand: 'Caveat', cursive;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-main);
    background: var(--sky);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
  }

  /* ── MEADOW ── */
  #meadow-wrap {
    position: fixed; inset: 0;
    overflow: hidden;
  }
  #meadow {
    position: absolute;
    width: 4000px; height: 4000px;
    background:
      radial-gradient(ellipse 60% 40% at 50% 100%, #7ec87e55 0%, transparent 70%),
      linear-gradient(180deg, #c8e6c8 0%, #a8d8a8 40%, #8fbc8f 100%);
    will-change: transform;
    transition: transform 0.05s linear;
  }

  /* Subtle meadow texture dots */
  #meadow::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, #6aad6a22 1px, transparent 1px),
      radial-gradient(circle, #4a8a4a11 1px, transparent 1px);
    background-size: 40px 40px, 80px 80px;
    background-position: 0 0, 20px 20px;
    pointer-events: none;
  }

  /* Camera crosshair */
  #crosshair {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    pointer-events: none;
    opacity: 0.35;
    z-index: 5;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: var(--stem);
    border-radius: 2px;
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%;  top:  50%; transform: translateY(-50%); }

  /* ── FLOWERS IN MEADOW ── */
  .meadow-flower {
    position: absolute;
    transform-origin: bottom center;
    cursor: pointer;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }
  .meadow-flower:hover { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.25)) brightness(1.05); }
  .meadow-flower .sway { animation: sway 3s ease-in-out infinite; transform-origin: bottom center; }
  .meadow-flower:nth-child(odd) .sway { animation-delay: -1.5s; animation-duration: 3.7s; }
  .meadow-flower:nth-child(3n) .sway  { animation-delay: -0.8s; animation-duration: 2.9s; }

  @keyframes sway {
    0%,100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  /* Tooltip */
  .signpost {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    border: 1.5px solid var(--ui-border);
    border-radius: 10px;
    padding: 6px 12px;
    white-space: nowrap;
    font-family: var(--font-hand);
    font-size: 14px;
    color: var(--text);
    box-shadow: 0 4px 12px var(--shadow);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 50;
  }
  .meadow-flower:hover .signpost { opacity: 1; }
  .signpost::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(255,255,255,0.95);
  }

  /* Legendary shimmer */
  @keyframes legendary-shimmer {
    0%,100% { filter: drop-shadow(0 0 6px #ffd700aa) drop-shadow(0 0 12px #ffaa0055); }
    50%      { filter: drop-shadow(0 0 14px #ffd700ff) drop-shadow(0 0 24px #ff880099); }
  }
  .legendary .sway { animation: sway 3s ease-in-out infinite, legendary-shimmer 2s ease-in-out infinite; }

  /* ── UI PANEL ── */
  #ui {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: opacity 0.4s, transform 0.4s;
  }
  #ui.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(20px); }

  /* Growth card */
  #growth-card {
    background: var(--ui-bg);
    border: 1.5px solid var(--ui-border);
    border-radius: 20px;
    padding: 16px 24px;
    box-shadow: 0 8px 32px var(--shadow);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    min-width: 340px;
  }

  #topic-input {
    width: 100%;
    border: 1.5px solid var(--ui-border);
    border-radius: 12px;
    padding: 8px 14px;
    font-family: var(--font-hand);
    font-size: 18px;
    color: var(--text);
    background: rgba(255,255,255,0.7);
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }
  #topic-input:focus { border-color: var(--accent); }
  #topic-input::placeholder { color: #aabcaa; }

  /* Progress bar */
  #progress-wrap {
    width: 100%;
    position: relative;
  }
  #progress-bar-bg {
    width: 100%;
    height: 10px;
    background: rgba(150,200,150,0.25);
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #7db87d, #b5e8a0);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
    width: 0%;
  }
  #progress-label {
    position: absolute;
    right: 0; top: -18px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  #stage-label {
    font-family: var(--font-hand);
    font-size: 13px;
    color: var(--stem);
    text-align: center;
    margin-top: 2px;
  }

  /* Live flower preview */
  #preview-wrap {
    width: 90px; height: 110px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  #preview-svg .sway { animation: sway 3s ease-in-out infinite; transform-origin: bottom center; }

  /* Action buttons */
  #action-buttons {
    display: flex;
    gap: 10px;
  }
  .action-btn {
    border: none;
    border-radius: 14px;
    padding: 10px 20px;
    font-family: var(--font-hand);
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 3px 10px var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .action-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.1s;
    border-radius: inherit;
  }
  .action-btn:active::after { opacity: 0.25; }
  .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px var(--shadow); }
  .action-btn:active { transform: translateY(0); }

  #btn-watch  { background: linear-gradient(135deg, #b5d8f7, #9bc5ee); color: #3a6a9a; }
  #btn-notes  { background: linear-gradient(135deg, #ffd6a5, #f7c07a); color: #8a5a20; }
  #btn-practice { background: linear-gradient(135deg, #c3b1e1, #b09ad8); color: #4a3070; }

  /* Bottom controls */
  #controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .ctrl-btn {
    background: var(--ui-bg);
    border: 1.5px solid var(--ui-border);
    border-radius: 12px;
    padding: 7px 16px;
    font-family: var(--font-hand);
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 3px 10px var(--shadow);
    transition: transform 0.15s, background 0.2s;
  }
  .ctrl-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.95); }

  /* Coords display */
  #coords {
    font-family: var(--font-main);
    font-size: 11px;
    color: rgba(74,103,65,0.55);
    letter-spacing: 0.3px;
  }

  /* Bloom burst overlay */
  #bloom-burst {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #bloom-burst.show { opacity: 1; }
  #bloom-burst-inner {
    font-family: var(--font-hand);
    font-size: 28px;
    color: #5a8a5a;
    text-shadow: 0 2px 12px rgba(100,180,100,0.4);
    animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop-in {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* Bloom particle ring */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 199; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: fly-out 1.2s ease-out forwards;
  }
  @keyframes fly-out {
    from { opacity: 1; transform: translate(0,0) scale(1); }
    to   { opacity: 0; transform: var(--tx) scale(0); }
  }

  /* Photo mode hint */
  #photo-hint {
    position: fixed;
    top: 16px; right: 16px;
    font-family: var(--font-hand);
    font-size: 14px;
    color: rgba(74,103,65,0.5);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  #photo-hint.show { opacity: 1; }

  /* Flower count badge */
  #flower-count {
    position: fixed;
    top: 16px; left: 16px;
    background: var(--ui-bg);
    border: 1.5px solid var(--ui-border);
    border-radius: 12px;
    padding: 6px 14px;
    font-family: var(--font-hand);
    font-size: 15px;
    color: var(--text);
    backdrop-filter: blur(8px);
    box-shadow: 0 3px 10px var(--shadow);
    z-index: 100;
    transition: opacity 0.4s;
  }
  #flower-count.hidden { opacity: 0; }
</style>
</head>
<body>

<!-- MEADOW -->
<div id="meadow-wrap">
  <div id="meadow"></div>
</div>
<div id="crosshair"></div>

<!-- PARTICLES & BLOOM BURST -->
<div id="particles"></div>
<div id="bloom-burst"><div id="bloom-burst-inner"></div></div>

<!-- FLOWER COUNT -->
<div id="flower-count">🌸 0 flowers</div>

<!-- PHOTO MODE HINT -->
<div id="photo-hint">Photo Mode — press P or click to exit</div>

<!-- UI PANEL -->
<div id="ui">
  <div id="growth-card">
    <input id="topic-input" type="text" placeholder="What are you studying? 🌱" maxlength="50">

    <div id="preview-wrap">
      <svg id="preview-svg" width="90" height="110"></svg>
    </div>

    <div id="progress-wrap">
      <div id="progress-label">0%</div>
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
      <div id="stage-label">🌱 Seedling</div>
    </div>

    <div id="action-buttons">
      <button class="action-btn" id="btn-watch"    onclick="addProgress('watch')">👁 Watching</button>
      <button class="action-btn" id="btn-notes"    onclick="addProgress('notes')">✏️ Notes</button>
      <button class="action-btn" id="btn-practice" onclick="addProgress('practice')">⚡ Practice</button>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" onclick="recenter()">🎯 Recenter</button>
    <button class="ctrl-btn" onclick="togglePhotoMode()">📷 Photo Mode</button>
    <button class="ctrl-btn" onclick="resetSession()">🔄 New Flower</button>
    <span id="coords">0, 0</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DNA CONSTANTS (must come first)
// ═══════════════════════════════════════════════════════
const PALETTE = [
  '#f9b4c8','#f7a0b8','#ffb3ba', // pinks
  '#b5d8f7','#9bc5ee','#b8d4f0', // blues
  '#ffd6a5','#f9c784','#ffe0a0', // yellows
  '#c3b1e1','#b09ad8','#d4c5f0', // purples
  '#a8e6cf','#90d4b2','#b8f0d8', // greens
  '#ffc8dd','#ffafcc','#f0b4d0', // roses
];
const CENTER_COLORS = ['#fff9f0','#fffde0','#fff0f5','#f0fff4','#f5f0ff'];
const SHAPES = ['round','star','heart','teardrop','oval'];

function newDNA() {
  return {
    petalColor:  PALETTE[Math.floor(Math.random()*PALETTE.length)],
    petalColor2: PALETTE[Math.floor(Math.random()*PALETTE.length)],
    centerColor: CENTER_COLORS[Math.floor(Math.random()*CENTER_COLORS.length)],
    petalCount:  Math.floor(Math.random()*4)+4,     // 4-7
    petalShape:  SHAPES[Math.floor(Math.random()*SHAPES.length)],
    stemWobble:  (Math.random()-0.5)*8,
    leafSide:    Math.random()<0.5?'left':'right',
    height:      0.85 + Math.random()*0.3,
    legendary:   false,
  };
}

function mutateDNA(dna, type) {
  const r = Math.random();
  if (r < 0.35) dna.petalColor  = PALETTE[Math.floor(Math.random()*PALETTE.length)];
  if (r < 0.20) dna.petalColor2 = PALETTE[Math.floor(Math.random()*PALETTE.length)];
  if (r < 0.15) dna.petalCount  = Math.max(3, Math.min(8, dna.petalCount + (Math.random()<0.5?1:-1)));
  if (r < 0.10) dna.petalShape  = SHAPES[Math.floor(Math.random()*SHAPES.length)];
  if (type === 'practice' && Math.random() < 0.10) dna.legendary = true;
}

// ═══════════════════════════════════════════════════════
//  STATE (after DNA functions so newDNA() is available)
// ═══════════════════════════════════════════════════════
let meadow = [];
let camera = { x: 2000, y: 2000 };
let keys   = {};
let photoMode = false;
let session = { progress: 0, dna: newDNA() };

// ═══════════════════════════════════════════════════════
//  SVG FLOWER GENERATOR
// ═══════════════════════════════════════════════════════
function petalPath(shape, rx, ry) {
  switch(shape) {
    case 'star':     return `M0,0 L${rx*0.3},${-ry*0.6} L0,${-ry} L${-rx*0.3},${-ry*0.6} Z`;
    case 'heart':    return `M0,0 C${rx*0.8},${-ry*0.2} ${rx*0.8},${-ry*0.9} 0,${-ry} C${-rx*0.8},${-ry*0.9} ${-rx*0.8},${-ry*0.2} 0,0 Z`;
    case 'teardrop': return `M0,0 C${rx*0.7},${-ry*0.1} ${rx*0.5},${-ry*0.8} 0,${-ry} C${-rx*0.5},${-ry*0.8} ${-rx*0.7},${-ry*0.1} 0,0 Z`;
    case 'oval':     return `M0,0 C${rx*1.2},${-ry*0.2} ${rx*1.2},${-ry*0.8} 0,${-ry} C${-rx*1.2},${-ry*0.8} ${-rx*1.2},${-ry*0.2} 0,0 Z`;
    default:         return `M0,0 C${rx},${-ry*0.2} ${rx},${-ry*0.8} 0,${-ry} C${-rx},${-ry*0.8} ${-rx},${-ry*0.2} 0,0 Z`;
  }
}

function buildFlowerSVG(dna, progress, w, h) {
  const pct = progress / 100;
  const stage = getStage(progress);
  const baseH = h * dna.height;
  const stemH = baseH * Math.min(1, pct * 1.5);
  const cx = w / 2, cy = h;

  let svg = `<g class="sway">`;

  // STEM
  if (progress > 0) {
    const wobble = dna.stemWobble * pct;
    svg += `<path d="M${cx},${cy} Q${cx+wobble},${cy-stemH*0.5} ${cx},${cy-stemH}"
      fill="none" stroke="#5a8a5a" stroke-width="${2+pct}" stroke-linecap="round"/>`;
  }

  // LEAF (sprout+)
  if (progress >= 25) {
    const lx = dna.leafSide==='left'?-1:1;
    const ly = cy - stemH*0.45;
    const leafSize = 10 + pct*12;
    svg += `<ellipse cx="${cx+lx*leafSize*0.8}" cy="${ly}" rx="${leafSize}" ry="${leafSize*0.45}"
      fill="#6ab56a" transform="rotate(${lx*-35},${cx+lx*leafSize*0.8},${ly})" opacity="0.85"/>`;
    // second small leaf opposite
    if (progress >= 50) {
      const lx2 = -lx;
      const ly2 = cy - stemH*0.65;
      svg += `<ellipse cx="${cx+lx2*leafSize*0.6}" cy="${ly2}" rx="${leafSize*0.7}" ry="${leafSize*0.3}"
        fill="#6ab56a" transform="rotate(${lx2*-35},${cx+lx2*leafSize*0.6},${ly2})" opacity="0.7"/>`;
    }
  }

  // BUD (50%+)
  if (progress >= 50 && progress < 100) {
    const bx = cx, by = cy - stemH;
    const bSize = 8 + pct*10;
    svg += `<ellipse cx="${bx}" cy="${by}" rx="${bSize*0.6}" ry="${bSize}" fill="${dna.petalColor}" opacity="0.9"/>`;
    svg += `<ellipse cx="${bx}" cy="${by}" rx="${bSize*0.35}" ry="${bSize*0.6}" fill="${dna.centerColor}" opacity="0.8"/>`;
  }

  // FULL BLOOM (100%)
  if (progress >= 100) {
    const fx = cx, fy = cy - stemH;
    const pr = 12 + (w/90)*8; // petal radius
    const pl = 8 + (w/90)*5;  // petal length

    // petals
    for (let i = 0; i < dna.petalCount; i++) {
      const angle = (360/dna.petalCount)*i;
      const col = i%2===0 ? dna.petalColor : dna.petalColor2;
      svg += `<g transform="translate(${fx},${fy}) rotate(${angle})">
        <path d="${petalPath(dna.petalShape,pl*0.6,pr)}" fill="${col}" opacity="0.92"/>
      </g>`;
    }
    // center
    svg += `<circle cx="${fx}" cy="${fy}" r="${pl*0.6}" fill="${dna.centerColor}" stroke="#d4a85a33" stroke-width="1"/>`;
    // center dots
    for(let i=0;i<6;i++){
      const a=Math.random()*Math.PI*2, d=pl*0.3*Math.random();
      svg+=`<circle cx="${fx+Math.cos(a)*d}" cy="${fy+Math.sin(a)*d}" r="1.5" fill="#d4a85a55"/>`;
    }
  }

  // SEEDLING (tiny sprout)
  if (progress > 0 && progress < 25) {
    const s = 4 + pct*8;
    svg += `<ellipse cx="${cx-s*0.5}" cy="${cy-stemH-s}" rx="${s*0.6}" ry="${s*0.35}"
      fill="#8ac88a" transform="rotate(-30,${cx-s*0.5},${cy-stemH-s})"/>`;
    svg += `<ellipse cx="${cx+s*0.5}" cy="${cy-stemH-s*0.6}" rx="${s*0.5}" ry="${s*0.3}"
      fill="#8ac88a" transform="rotate(25,${cx+s*0.5},${cy-stemH-s*0.6})"/>`;
  }

  svg += `</g>`;
  return svg;
}

function getStage(p) {
  if (p < 25) return 'Seedling 🌱';
  if (p < 50) return 'Sprout 🌿';
  if (p < 100) return 'Bud 🌼';
  return 'Full Bloom 🌸';
}

// ═══════════════════════════════════════════════════════
//  RENDER PREVIEW
// ═══════════════════════════════════════════════════════
function renderPreview() {
  const svg = document.getElementById('preview-svg');
  svg.innerHTML = buildFlowerSVG(session.dna, session.progress, 90, 110);
  if (session.dna.legendary) {
    svg.querySelector('.sway').style.animation = 'sway 3s ease-in-out infinite, legendary-shimmer 2s ease-in-out infinite';
  }
}

function updateUI() {
  const pct = Math.min(100, session.progress);
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent = pct+'%';
  document.getElementById('stage-label').textContent = getStage(pct);
  renderPreview();
}

// ═══════════════════════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════════════════════
function addProgress(type) {
  const gains = { watch:5, notes:10, practice:20 };
  const was100 = session.progress >= 100;
  session.progress = Math.min(100, session.progress + gains[type]);
  mutateDNA(session.dna, type);

  playSound(type);
  updateUI();

  if (session.progress >= 100 && !was100) {
    setTimeout(bloomFlower, 300);
  }
}

// ═══════════════════════════════════════════════════════
//  BLOOM
// ═══════════════════════════════════════════════════════
function bloomFlower() {
  const topic = document.getElementById('topic-input').value.trim() || 'Unknown Topic';
  const date  = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  const flower = {
    dna: { ...session.dna },
    x: camera.x + (Math.random()-0.5)*60,
    y: camera.y + (Math.random()-0.5)*40,
    topic,
    date,
    id: Date.now(),
  };

  meadow.push(flower);
  saveMeadow();
  placeFlowerEl(flower);
  updateFlowerCount();

  playBloom();
  showBloomBurst(topic, session.dna.legendary);
  spawnParticles();

  // reset session after short delay
  setTimeout(() => {
    session = { progress: 0, dna: newDNA() };
    document.getElementById('topic-input').value = '';
    updateUI();
  }, 2000);
}

function placeFlowerEl(flower) {
  const W = 60, H = 80;
  const el = document.createElement('div');
  el.className = 'meadow-flower' + (flower.dna.legendary?' legendary':'');
  el.style.left = (flower.x - W/2)+'px';
  el.style.top  = (flower.y - H)+'px';
  el.style.width  = W+'px';
  el.style.height = H+'px';
  el.dataset.id = flower.id;

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.setAttribute('width',W); svgEl.setAttribute('height',H);
  svgEl.innerHTML = buildFlowerSVG(flower.dna, 100, W, H);
  el.appendChild(svgEl);

  // tooltip
  const tip = document.createElement('div');
  tip.className = 'signpost';
  tip.innerHTML = `<strong>${flower.topic}</strong><br><small>${flower.date}</small>`;
  el.appendChild(tip);

  document.getElementById('meadow').appendChild(el);
}

// ═══════════════════════════════════════════════════════
//  BLOOM BURST & PARTICLES
// ═══════════════════════════════════════════════════════
function showBloomBurst(topic, legendary) {
  const el = document.getElementById('bloom-burst');
  const inner = document.getElementById('bloom-burst-inner');
  inner.textContent = legendary ? `✨ Legendary Bloom! ✨\n"${topic}"` : `🌸 Bloomed!\n"${topic}"`;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

function spawnParticles() {
  const container = document.getElementById('particles');
  const colors = [session.dna.petalColor, session.dna.petalColor2, '#ffd6a5','#c3b1e1'];
  for(let i=0;i<20;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 6+Math.random()*10;
    const angle = Math.random()*Math.PI*2;
    const dist  = 80+Math.random()*160;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:50%;top:50%;margin-left:${-size/2}px;margin-top:${-size/2}px;
      --tx:translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px);
      animation-delay:${Math.random()*0.3}s;
      opacity:0.85;
    `;
    container.appendChild(p);
    setTimeout(()=>p.remove(), 1600);
  }
}

// ═══════════════════════════════════════════════════════
//  CAMERA & NAVIGATION
// ═══════════════════════════════════════════════════════
const SPEED = 6;
function applyCamera() {
  camera.x = Math.max(0, Math.min(4000, camera.x));
  camera.y = Math.max(0, Math.min(4000, camera.y));
  const vw = window.innerWidth, vh = window.innerHeight;
  const tx = -(camera.x - vw/2), ty = -(camera.y - vh/2);
  document.getElementById('meadow').style.transform = `translate(${tx}px,${ty}px)`;
  document.getElementById('coords').textContent = `${Math.round(camera.x)}, ${Math.round(camera.y)}`;
}

function moveCamera() {
  if(keys['ArrowLeft']||keys['a']||keys['A']) camera.x -= SPEED;
  if(keys['ArrowRight']||keys['d']||keys['D']) camera.x += SPEED;
  if(keys['ArrowUp']||keys['w']||keys['W']) camera.y -= SPEED;
  if(keys['ArrowDown']||keys['s']||keys['S']) camera.y += SPEED;
  applyCamera();
  requestAnimationFrame(moveCamera);
}

document.addEventListener('keydown', e => {
  const typing = document.activeElement === document.getElementById('topic-input');
  if(typing) return;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','d','w','s','A','D','W','S'].includes(e.key)){
    e.preventDefault();
    keys[e.key] = true;
  }
  if(e.key==='p'||e.key==='P') togglePhotoMode();
  if(e.key==='Escape') { if(photoMode) togglePhotoMode(); }
});
document.addEventListener('keyup', e => { if(document.activeElement !== document.getElementById('topic-input')) delete keys[e.key]; });

function recenter() {
  camera = { x:2000, y:2000 };
  applyCamera();
}

// ═══════════════════════════════════════════════════════
//  PHOTO MODE
// ═══════════════════════════════════════════════════════
function togglePhotoMode() {
  photoMode = !photoMode;
  document.getElementById('ui').classList.toggle('hidden', photoMode);
  document.getElementById('flower-count').classList.toggle('hidden', photoMode);
  document.getElementById('crosshair').style.opacity = photoMode?'0':'0.35';
  document.getElementById('photo-hint').classList.toggle('show', photoMode);
}

document.getElementById('bloom-burst').addEventListener('click', ()=>{ if(photoMode) togglePhotoMode(); });
document.getElementById('photo-hint').addEventListener('click', ()=>{ if(photoMode) togglePhotoMode(); });

// ═══════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════
function saveMeadow() {
  localStorage.setItem('studyMeadow', JSON.stringify(meadow));
}

function loadMeadow() {
  meadow.forEach(f => placeFlowerEl(f));
  updateFlowerCount();
}

function updateFlowerCount() {
  document.getElementById('flower-count').textContent = `🌸 ${meadow.length} flower${meadow.length!==1?'s':''}`;
}

function resetSession() {
  session = { progress:0, dna: newDNA() };
  document.getElementById('topic-input').value = '';
  updateUI();
}

// ═══════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type='sine', dur=0.15, vol=0.12, delay=0) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain= ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime+delay);
    osc.frequency.exponentialRampToValueAtTime(freq*1.5, ctx.currentTime+delay+dur*0.3);
    gain.gain.setValueAtTime(0, ctx.currentTime+delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime+delay+0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+dur);
    osc.start(ctx.currentTime+delay);
    osc.stop(ctx.currentTime+delay+dur);
  } catch(e){}
}

function playSound(type) {
  const sounds = {
    watch:    [()=>playTone(440,'sine',0.12,0.1)],
    notes:    [()=>playTone(523,'sine',0.12,0.1), ()=>playTone(659,'sine',0.1,0.08,0.08)],
    practice: [()=>playTone(392,'triangle',0.08,0.1), ()=>playTone(523,'triangle',0.1,0.1,0.06), ()=>playTone(659,'triangle',0.12,0.08,0.12)],
  };
  sounds[type].forEach(fn=>fn());
}

function playBloom() {
  // ascending chime
  [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.35,0.13,i*0.12));
  // sparkle layer
  setTimeout(()=>{
    [1568,1865,2093].forEach((f,i)=>playTone(f,'sine',0.2,0.06,i*0.08));
  }, 500);
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  meadow = JSON.parse(localStorage.getItem('studyMeadow') || '[]');
  applyCamera();
  loadMeadow();
  updateUI();
  moveCamera();
});
