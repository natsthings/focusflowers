<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Meadow 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e8f4f0;
    --grass: #a8d8a8;
    --soil: #c4a882;
    --petal-a: #f9b4c8;
    --petal-b: #b5d8f7;
    --petal-c: #ffd6a5;
    --petal-d: #c3b1e1;
    --stem: #5a8a5a;
    --ui-bg: rgba(255,255,255,0.82);
    --ui-border: rgba(180,200,180,0.5);
    --text: #4a6741;
    --accent: #7db87d;
    --shadow: rgba(100,150,100,0.18);
    --font-main: 'Nunito', sans-serif;
    --font-hand: 'Caveat', cursive;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-main);
    background: var(--sky);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
  }

  /* ── MEADOW ── */
  #meadow-wrap {
    position: fixed; inset: 0;
    overflow: hidden;
  }
  #meadow {
    position: absolute;
    width: 4000px; height: 4000px;
    background:
      radial-gradient(ellipse 60% 40% at 50% 100%, #7ec87e55 0%, transparent 70%),
      linear-gradient(180deg, #c8e6c8 0%, #a8d8a8 40%, #8fbc8f 100%);
    will-change: transform;
    transition: transform 0.05s linear;
    transform-origin: 0 0;
  }

  /* Subtle meadow texture dots */
  #meadow::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, #6aad6a22 1px, transparent 1px),
      radial-gradient(circle, #4a8a4a11 1px, transparent 1px);
    background-size: 40px 40px, 80px 80px;
    background-position: 0 0, 20px 20px;
    pointer-events: none;
  }

  /* Camera crosshair */
  #crosshair {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    pointer-events: none;
    opacity: 0.35;
    z-index: 5;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: var(--stem);
    border-radius: 2px;
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%;  top:  50%; transform: translateY(-50%); }

  /* ── FLOWERS IN MEADOW ── */
  .meadow-flower {
    position: absolute;
    transform-origin: bottom center;
    cursor: pointer;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }
  .meadow-flower:hover { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.25)) brightness(1.05); }
  .meadow-flower .sway { animation: sway 3s ease-in-out infinite; transform-origin: bottom center; }
  .meadow-flower:nth-child(odd) .sway { animation-delay: -1.5s; animation-duration: 3.7s; }
  .meadow-flower:nth-child(3n) .sway  { animation-delay: -0.8s; animation-duration: 2.9s; }

  @keyframes sway {
    0%,100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  /* Tooltip */
  .signpost {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    border: 1.5px solid var(--ui-border);
    border-radius: 10px;
    padding: 6px 12px;
    white-space: nowrap;
    font-family: var(--font-hand);
    font-size: 14px;
    color: var(--text);
    box-shadow: 0 4px 12px var(--shadow);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 50;
  }
  .meadow-flower:hover .signpost { opacity: 1; }
  .signpost::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(255,255,255,0.95);
  }

  /* Legendary shimmer */
  @keyframes legendary-shimmer {
    0%,100% { filter: drop-shadow(0 0 6px #ffd700aa) drop-shadow(0 0 12px #ffaa0055); }
    50%      { filter: drop-shadow(0 0 14px #ffd700ff) drop-shadow(0 0 24px #ff880099); }
  }
  .legendary .sway { animation: sway 3s ease-in-out infinite, legendary-shimmer 2s ease-in-out infinite; }

  /* ── UI PANEL ── */
  #ui {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: opacity 0.4s, transform 0.4s;
  }
  #ui.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(20px); }

  /* Growth card */
  #growth-card {
    background: var(--ui-bg);
    border: 1.5px solid var(--ui-border);
    border-radius: 20px;
    padding: 16px 24px;
    box-shadow: 0 8px 32px var(--shadow);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    min-width: 340px;
  }

  #topic-input {
    width: 100%;
    border: 1.5px solid var(--ui-border);
    border-radius: 12px;
    padding: 8px 14px;
    font-family: var(--font-hand);
    font-size: 18px;
    color: var(--text);
    background: rgba(255,255,255,0.7);
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }
  #topic-input:focus { border-color: var(--accent); }
  #topic-input::placeholder { color: #aabcaa; }

  /* Progress bar */
  #progress-wrap {
    width: 100%;
    position: relative;
  }
  #progress-bar-bg {
    width: 100%;
    height: 10px;
    background: rgba(150,200,150,0.25);
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #7db87d, #b5e8a0);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
    width: 0%;
  }
  #progress-label {
    position: absolute;
    right: 0; top: -18px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  #stage-label {
    font-family: var(--font-hand);
    font-size: 13px;
    color: var(--stem);
    text-align: center;
    margin-top: 2px;
  }

  /* Live flower preview */
  #preview-wrap {
    width: 120px; height: 140px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  #preview-svg .sway { animation: sway 3s ease-in-out infinite; transform-origin: bottom center; }
  #preview-svg { overflow: visible; }

  /* Action buttons */
  #action-buttons {
    display: flex;
    gap: 10px;
  }
  .action-btn {
    border: none;
    border-radius: 14px;
    padding: 10px 20px;
    font-family: var(--font-hand);
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 3px 10px var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .action-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.1s;
    border-radius: inherit;
  }
  .action-btn:active::after { opacity: 0.25; }
  .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px var(--shadow); }
  .action-btn:active { transform: translateY(0); }

  #btn-watch  { background: linear-gradient(135deg, #b5d8f7, #9bc5ee); color: #3a6a9a; }
  #btn-notes  { background: linear-gradient(135deg, #ffd6a5, #f7c07a); color: #8a5a20; }
  #btn-practice { background: linear-gradient(135deg, #c3b1e1, #b09ad8); color: #4a3070; }

  /* Bottom controls */
  #controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .ctrl-btn {
    background: var(--ui-bg);
    border: 1.5px solid var(--ui-border);
    border-radius: 12px;
    padding: 7px 16px;
    font-family: var(--font-hand);
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 3px 10px var(--shadow);
    transition: transform 0.15s, background 0.2s;
  }
  .ctrl-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.95); }

  /* Coords display */
  #coords {
    font-family: var(--font-main);
    font-size: 11px;
    color: rgba(74,103,65,0.55);
    letter-spacing: 0.3px;
  }

  /* Bloom burst overlay */
  #bloom-burst {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #bloom-burst.show { opacity: 1; }
  #bloom-burst-inner {
    font-family: var(--font-hand);
    font-size: 28px;
    color: #5a8a5a;
    text-shadow: 0 2px 12px rgba(100,180,100,0.4);
    animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop-in {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* Bloom particle ring */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 199; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: fly-out 1.2s ease-out forwards;
  }
  @keyframes fly-out {
    from { opacity: 1; transform: translate(0,0) scale(1); }
    to   { opacity: 0; transform: var(--tx) scale(0); }
  }

  /* Photo mode hint */
  #photo-hint {
    position: fixed;
    top: 16px; right: 16px;
    font-family: var(--font-hand);
    font-size: 14px;
    color: rgba(74,103,65,0.5);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  #photo-hint.show { opacity: 1; }

  /* Flower count badge */
  #flower-count {
    position: fixed;
    top: 16px; left: 16px;
    background: var(--ui-bg);
    border: 1.5px solid var(--ui-border);
    border-radius: 12px;
    padding: 6px 14px;
    font-family: var(--font-hand);
    font-size: 15px;
    color: var(--text);
    backdrop-filter: blur(8px);
    box-shadow: 0 3px 10px var(--shadow);
    z-index: 100;
    transition: opacity 0.4s;
  }
  #flower-count.hidden { opacity: 0; }
</style>
</head>
<body>

<!-- MEADOW -->
<div id="meadow-wrap">
  <div id="meadow"></div>
</div>
<div id="crosshair"></div>

<!-- PARTICLES & BLOOM BURST -->
<div id="particles"></div>
<div id="bloom-burst"><div id="bloom-burst-inner"></div></div>

<!-- FLOWER COUNT -->
<div id="flower-count">🌸 0 flowers</div>

<!-- PHOTO MODE HINT -->
<div id="photo-hint">Photo Mode — press P or click to exit</div>

<!-- UI PANEL -->
<div id="ui">
  <div id="growth-card">
    <input id="topic-input" type="text" placeholder="What are you studying? 🌱" maxlength="50">

    <div id="preview-wrap">
      <svg id="preview-svg" width="120" height="140" viewBox="0 0 120 140"></svg>
    </div>

    <div id="progress-wrap">
      <div id="progress-label">0%</div>
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
      <div id="stage-label">🌱 Seedling</div>
    </div>

    <div id="action-buttons">
      <button class="action-btn" id="btn-watch"    onclick="addProgress('watch')">👁 Watching</button>
      <button class="action-btn" id="btn-notes"    onclick="addProgress('notes')">✏️ Notes</button>
      <button class="action-btn" id="btn-practice" onclick="addProgress('practice')">⚡ Practice</button>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" onclick="recenter()">🎯 Recenter</button>
    <button class="ctrl-btn" onclick="togglePhotoMode()">📷 Photo Mode</button>
    <button class="ctrl-btn" onclick="resetSession()">🔄 New Flower</button>
    <span id="coords">0, 0</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DNA CONSTANTS (must come first)
// ═══════════════════════════════════════════════════════
const PALETTE = [
  // pinks & roses
  '#f9b4c8','#f7a0b8','#ffb3ba','#ff8fab','#fc6c85','#e8a0bf','#f4acb7','#ffcad4',
  // reds & corals
  '#ff6b6b','#ff8e72','#ff6f61','#e05c5c','#f28b82','#ff9999','#ffb4a2','#e07a5f',
  // oranges & peaches
  '#ffb347','#ffa07a','#ff8c69','#ffcba4','#f9a85d','#ffad60','#ffc09f','#ff7f50',
  // yellows & golds
  '#ffd6a5','#f9c784','#ffe0a0','#fde74c','#ffe066','#ffd000','#f4d35e','#ffef9f',
  // greens (unusual petal colors!)
  '#b8f0b8','#a8e6cf','#90d4b2','#b5ead7','#c7f2a4','#a0c878','#d4f0a0',
  // blues
  '#b5d8f7','#9bc5ee','#b8d4f0','#7ec8e3','#a8dadc','#90e0ef','#caf0f8','#6daedb',
  // purples & lavenders
  '#c3b1e1','#b09ad8','#d4c5f0','#c8b6e2','#b39ddb','#e0bbff','#d8b4fe','#a78bfa',
  // magentas & violets
  '#f72585','#e040fb','#ce93d8','#f48fb1','#ea80fc','#ff80ab','#ff4081',
  // whites & creams
  '#fff0f5','#fef9ef','#f0f8ff','#fffacd','#f5fffa','#fff5ee',
  // rare/exotic
  '#40e0d0','#7fffd4','#00ced1','#da70d6','#ff69b4','#dda0dd','#ee82ee',
];

const CENTER_COLORS = [
  '#fff9f0','#fffde0','#fff0f5','#f0fff4','#f5f0ff',
  '#fde68a','#fcd34d','#f59e0b','#d97706', // golds
  '#6ee7b7','#34d399', // greens
  '#fbcfe8','#f9a8d4', // pinks
  '#c4b5fd','#a78bfa', // purples
  '#fed7aa','#fdba74', // oranges
  '#ffffff','#f8fafc',  // white
];

const SHAPES = [
  'round','oval','teardrop','heart','star',
  'spiky','ruffled','notched','scallop','strap',
];

const LEAF_COLORS = [
  '#4a8a4a','#5aa55a','#68b568','#3d7a3d',
  '#6aaa6a','#557a55','#7ac87a','#8fbc8f',
];

function newDNA() {
  // Sometimes pick two colors from the same family for harmony,
  // sometimes pick wildly different for contrast
  const c1 = PALETTE[Math.floor(Math.random()*PALETTE.length)];
  const c2 = Math.random()<0.4
    ? PALETTE[Math.floor(Math.random()*PALETTE.length)]  // random contrast
    : shiftHue(c1);                                       // harmonic shift
  return {
    petalColor:  c1,
    petalColor2: c2,
    centerColor: CENTER_COLORS[Math.floor(Math.random()*CENTER_COLORS.length)],
    petalCount:  Math.floor(Math.random()*6)+4,  // 4-9
    petalShape:  SHAPES[Math.floor(Math.random()*SHAPES.length)],
    stemWobble:  (Math.random()-0.5)*10,
    leafSide:    Math.random()<0.5?'left':'right',
    leafColor:   LEAF_COLORS[Math.floor(Math.random()*LEAF_COLORS.length)],
    height:      0.8 + Math.random()*0.4,
    petalTilt:   Math.random()*15 - 7,   // slight rotation offset per flower
    petalOpacity: 0.82 + Math.random()*0.18,
    legendary:   false,
  };
}

// Shift a hex color slightly in lightness/hue for a harmonious pair
function shiftHue(hex) {
  // just pick a nearby index in PALETTE for simplicity
  const idx = PALETTE.indexOf(hex);
  const shift = Math.floor(Math.random()*5)+1;
  return PALETTE[(idx + shift) % PALETTE.length];
}

function mutateDNA(dna, type) {
  const r = Math.random();
  if (r < 0.45) dna.petalColor  = PALETTE[Math.floor(Math.random()*PALETTE.length)];
  if (r < 0.30) dna.petalColor2 = PALETTE[Math.floor(Math.random()*PALETTE.length)];
  if (r < 0.20) dna.centerColor = CENTER_COLORS[Math.floor(Math.random()*CENTER_COLORS.length)];
  if (r < 0.18) dna.petalCount  = Math.max(3, Math.min(9, dna.petalCount + (Math.random()<0.5?1:-1)));
  if (r < 0.12) dna.petalShape  = SHAPES[Math.floor(Math.random()*SHAPES.length)];
  if (r < 0.08) dna.petalTilt   = Math.random()*15 - 7;
  if (type === 'practice' && Math.random() < 0.10) dna.legendary = true;
}

// ═══════════════════════════════════════════════════════
//  STATE (after DNA functions so newDNA() is available)
// ═══════════════════════════════════════════════════════
let meadow = [];
let camera = { x: 2000, y: 2000 };
let keys   = {};
let photoMode = false;
let session = { progress: 0, dna: newDNA() };

// ═══════════════════════════════════════════════════════
//  SVG FLOWER GENERATOR
// ═══════════════════════════════════════════════════════
function petalPath(shape, rx, ry) {
  // Elegant tapered petal path — wide base, pointed tip
  const base = rx * 0.55;
  switch(shape) {
    case 'star':     // narrow pointed
      return `M0,0 C${base*0.5},${-ry*0.15} ${rx*0.25},${-ry*0.55} 0,${-ry}
              C${-rx*0.25},${-ry*0.55} ${-base*0.5},${-ry*0.15} 0,0 Z`;
    case 'heart':    // lobed top
      return `M0,0 C${base*1.4},${-ry*0.1} ${rx*0.9},${-ry*0.5} ${rx*0.4},${-ry*0.78}
              C${rx*0.1},${-ry*0.95} ${-rx*0.1},${-ry*0.95} ${-rx*0.4},${-ry*0.78}
              C${-rx*0.9},${-ry*0.5} ${-base*1.4},${-ry*0.1} 0,0 Z`;
    case 'teardrop': // wide base, sharp tip
      return `M0,0 C${base*1.3},${-ry*0.08} ${rx*0.6},${-ry*0.6} 0,${-ry}
              C${-rx*0.6},${-ry*0.6} ${-base*1.3},${-ry*0.08} 0,0 Z`;
    case 'oval':     // wide throughout
      return `M0,0 C${base*1.6},${-ry*0.05} ${base*1.6},${-ry*0.7} 0,${-ry}
              C${-base*1.6},${-ry*0.7} ${-base*1.6},${-ry*0.05} 0,0 Z`;
    case 'spiky':    // very narrow, strap-like spike
      return `M0,0 C${base*0.3},${-ry*0.1} ${base*0.3},${-ry*0.85} 0,${-ry}
              C${-base*0.3},${-ry*0.85} ${-base*0.3},${-ry*0.1} 0,0 Z`;
    case 'ruffled':  // wavy edges
      return `M0,0 C${base*1.1},${-ry*0.05} ${rx*1.1},${-ry*0.25} ${rx*0.7},${-ry*0.45}
              C${rx*1.2},${-ry*0.55} ${rx*0.9},${-ry*0.75} ${rx*0.3},${-ry*0.85}
              C${rx*0.1},${-ry*0.95} ${-rx*0.1},${-ry*0.95} ${-rx*0.3},${-ry*0.85}
              C${-rx*0.9},${-ry*0.75} ${-rx*1.2},${-ry*0.55} ${-rx*0.7},${-ry*0.45}
              C${-rx*1.1},${-ry*0.25} ${-base*1.1},${-ry*0.05} 0,0 Z`;
    case 'notched':  // indented tip
      return `M0,0 C${base*1.2},${-ry*0.1} ${rx*0.8},${-ry*0.55} ${rx*0.5},${-ry*0.78}
              C${rx*0.3},${-ry*0.9} ${rx*0.1},${-ry*0.82} 0,${-ry*0.88}
              C${-rx*0.1},${-ry*0.82} ${-rx*0.3},${-ry*0.9} ${-rx*0.5},${-ry*0.78}
              C${-rx*0.8},${-ry*0.55} ${-base*1.2},${-ry*0.1} 0,0 Z`;
    case 'scallop':  // rounded scalloped edge
      return `M0,0 C${base*1.3},${-ry*0.08} ${rx},${-ry*0.35} ${rx*0.85},${-ry*0.55}
              C${rx*1.15},${-ry*0.65} ${rx*0.75},${-ry*0.9} ${rx*0.25},${-ry*0.95}
              C0,${-ry} ${-rx*0.25},${-ry*0.95} ${-rx*0.75},${-ry*0.9}
              C${-rx*1.15},${-ry*0.65} ${-rx*0.85},${-ry*0.55} ${-rx},${-ry*0.35}
              C${-base*1.3},${-ry*0.08} 0,0 Z`;
    case 'strap':    // long flat strap petal like a daisy
      return `M0,0 C${base*0.7},${-ry*0.05} ${base*0.8},${-ry*0.8} ${base*0.4},${-ry}
              L${-base*0.4},${-ry} C${-base*0.8},${-ry*0.8} ${-base*0.7},${-ry*0.05} 0,0 Z`;
    default:         // round
      return `M0,0 C${base*1.2},${-ry*0.1} ${base*1.1},${-ry*0.75} 0,${-ry}
              C${-base*1.1},${-ry*0.75} ${-base*1.2},${-ry*0.1} 0,0 Z`;
  }
}

function leafPath(w, h) {
  return `M0,0 C${w*0.8},${-h*0.25} ${w*0.9},${-h*0.75} 0,${-h} C${-w*0.3},${-h*0.75} ${-w*0.1},${-h*0.25} 0,0 Z`;
}

function buildFlowerSVG(dna, progress, w, h) {
  const pct = progress / 100;
  // Reserve top 30% for the flower head, stem uses bottom 70%
  const maxStemH = h * 0.68;
  const stemH = maxStemH * Math.min(1, pct * 1.6);
  const cx = w / 2, cy = h - 4;
  const wobble = dna.stemWobble * pct * 0.5;
  // stem tip (where flower head sits)
  const tx = cx + wobble * 0.3;
  const ty = cy - stemH;

  let svg = `<g class="sway">`;

  // ── STEM ──
  if (progress > 0) {
    const sw = 1.2 + pct * 1.4;
    svg += `<path d="M${cx},${cy} C${cx+wobble*0.2},${cy-stemH*0.4} ${tx+wobble*0.3},${ty+stemH*0.35} ${tx},${ty}"
      fill="none" stroke="#4a7a4a" stroke-width="${sw}" stroke-linecap="round"/>`;
  }

  // ── LEAVES ──
  if (progress >= 25) {
    const lx = dna.leafSide === 'left' ? -1 : 1;
    const lScale = 0.55 + pct * 0.55;
    const lw = 7 * lScale, lh = 13 * lScale;
    // primary leaf
    const l1x = cx + lx * 2, l1y = cy - stemH * 0.42;
    svg += `<g transform="translate(${l1x},${l1y}) rotate(${lx * 42})">
      <path d="${leafPath(lw, lh)}" fill="${dna.leafColor || '#5aa55a'}" opacity="0.88"/>
      <path d="M0,0 C${lw*0.15},${-lh*0.35} ${lw*0.05},${-lh*0.7} 0,${-lh}"
        fill="none" stroke="#3d7a3d" stroke-width="0.6" opacity="0.5"/>
    </g>`;
    // secondary leaf (sprout+ only, opposite side)
    if (progress >= 50) {
      const l2x = cx - lx * 2, l2y = cy - stemH * 0.66;
      const lw2 = lw * 0.72, lh2 = lh * 0.72;
      svg += `<g transform="translate(${l2x},${l2y}) rotate(${-lx * 38})">
        <path d="${leafPath(lw2, lh2)}" fill="${dna.leafColor || '#68b568'}" opacity="0.78"/>
      </g>`;
    }
  }

  // ── SEEDLING COTYLEDONS ──
  if (progress > 0 && progress < 25) {
    const sScale = 0.4 + pct * 0.6;
    const s = (3 + pct * 9) * sScale;
    svg += `<g transform="translate(${tx},${ty})">
      <ellipse cx="${-s*0.9}" cy="${-s*0.2}" rx="${s}" ry="${s*0.45}"
        fill="#7ac87a" transform="rotate(-38,${-s*0.9},${-s*0.2})" opacity="0.9"/>
      <ellipse cx="${s*0.9}" cy="${-s*0.2}" rx="${s}" ry="${s*0.45}"
        fill="#7ac87a" transform="rotate(38,${s*0.9},${-s*0.2})" opacity="0.9"/>
    </g>`;
  }

  // ── BUD ──
  if (progress >= 50 && progress < 100) {
    const bSize = 4 + pct * 9;
    // sepals
    for(let i=0;i<4;i++){
      const a = (i/4)*Math.PI*2;
      svg += `<ellipse cx="${tx + Math.cos(a)*bSize*0.5}" cy="${ty + Math.sin(a)*bSize*0.3}"
        rx="${bSize*0.35}" ry="${bSize*0.7}"
        fill="#4a8a4a" opacity="0.7"
        transform="rotate(${a*(180/Math.PI)+90},${tx + Math.cos(a)*bSize*0.5},${ty + Math.sin(a)*bSize*0.3})"/>`;
    }
    // bud body
    svg += `<ellipse cx="${tx}" cy="${ty - bSize*0.3}" rx="${bSize*0.55}" ry="${bSize}"
      fill="${dna.petalColor}" opacity="0.92"/>`;
    svg += `<ellipse cx="${tx}" cy="${ty - bSize*0.5}" rx="${bSize*0.28}" ry="${bSize*0.55}"
      fill="${dna.petalColor2}" opacity="0.6"/>`;
  }

  // ── FULL BLOOM ──
  if (progress >= 100) {
    const scale = w / 90;
    const petalLen = 11 * scale + dna.petalCount * 0.3;
    const petalWid = 5 * scale;
    const centerR  = 4 * scale;

    // back petals (slightly darker, rotated half-step)
    for (let i = 0; i < dna.petalCount; i++) {
      const angle = (360/dna.petalCount)*i + (180/dna.petalCount) + (dna.petalTilt||0);
      const col = i%2===0 ? dna.petalColor2 : dna.petalColor;
      svg += `<g transform="translate(${tx},${ty}) rotate(${angle})">
        <path d="${petalPath(dna.petalShape, petalWid*0.85, petalLen*0.88)}"
          fill="${col}" opacity="0.45"/>
      </g>`;
    }
    // front petals
    for (let i = 0; i < dna.petalCount; i++) {
      const angle = (360/dna.petalCount)*i + (dna.petalTilt||0);
      const col = i%2===0 ? dna.petalColor : dna.petalColor2;
      // petal vein
      svg += `<g transform="translate(${tx},${ty}) rotate(${angle})">
        <path d="${petalPath(dna.petalShape, petalWid, petalLen)}"
          fill="${col}" opacity="0.93"/>
        <path d="M0,0 L0,${-petalLen*0.72}"
          fill="none" stroke="white" stroke-width="0.5" opacity="0.35" stroke-linecap="round"/>
      </g>`;
    }
    // center shadow ring
    svg += `<circle cx="${tx}" cy="${ty}" r="${centerR*1.25}" fill="#c4834444" opacity="0.3"/>`;
    // center
    svg += `<circle cx="${tx}" cy="${ty}" r="${centerR}" fill="${dna.centerColor}"/>`;
    // center texture dots
    const dotSeed = dna.petalCount * 7;
    for(let i=0;i<7;i++){
      const a = (i/7)*Math.PI*2 + dotSeed;
      const d = centerR * 0.52;
      svg += `<circle cx="${tx+Math.cos(a)*d}" cy="${ty+Math.sin(a)*d}"
        r="${0.9*scale}" fill="#b87030" opacity="0.55"/>`;
    }
    svg += `<circle cx="${tx}" cy="${ty}" r="${centerR*0.35}" fill="#d4903888" opacity="0.6"/>`;
  }

  svg += `</g>`;
  return svg;
}

function getStage(p) {
  if (p < 25) return 'Seedling 🌱';
  if (p < 50) return 'Sprout 🌿';
  if (p < 100) return 'Bud 🌼';
  return 'Full Bloom 🌸';
}

// ═══════════════════════════════════════════════════════
//  RENDER PREVIEW
// ═══════════════════════════════════════════════════════
function renderPreview() {
  const svg = document.getElementById('preview-svg');
  svg.innerHTML = buildFlowerSVG(session.dna, session.progress, 120, 140);
  if (session.dna.legendary) {
    const sway = svg.querySelector('.sway');
    if (sway) sway.style.animation = 'sway 3s ease-in-out infinite, legendary-shimmer 2s ease-in-out infinite';
  }
}

function updateUI() {
  const pct = Math.min(100, session.progress);
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent = pct+'%';
  document.getElementById('stage-label').textContent = getStage(pct);
  renderPreview();
}

// ═══════════════════════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════════════════════
function addProgress(type) {
  const gains = { watch:5, notes:10, practice:20 };
  const was100 = session.progress >= 100;
  session.progress = Math.min(100, session.progress + gains[type]);
  mutateDNA(session.dna, type);

  playSound(type);
  updateUI();

  if (session.progress >= 100 && !was100) {
    setTimeout(bloomFlower, 300);
  }
}

// ═══════════════════════════════════════════════════════
//  BLOOM
// ═══════════════════════════════════════════════════════
function bloomFlower() {
  const topic = document.getElementById('topic-input').value.trim() || 'Unknown Topic';
  const date  = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  const flower = {
    dna: { ...session.dna },
    x: camera.x + (Math.random()-0.5)*60,
    y: camera.y + (Math.random()-0.5)*40,
    topic,
    date,
    id: Date.now(),
  };

  meadow.push(flower);
  saveMeadow();
  placeFlowerEl(flower);
  updateFlowerCount();

  playBloom();
  showBloomBurst(topic, session.dna.legendary);
  spawnParticles();

  // reset session after short delay
  setTimeout(() => {
    session = { progress: 0, dna: newDNA() };
    document.getElementById('topic-input').value = '';
    updateUI();
  }, 2000);
}

function placeFlowerEl(flower) {
  const W = 120, H = 160;
  const el = document.createElement('div');
  el.className = 'meadow-flower' + (flower.dna.legendary?' legendary':'');
  el.style.left = (flower.x - W/2)+'px';
  el.style.top  = (flower.y - H)+'px';
  el.style.width  = W+'px';
  el.style.height = H+'px';
  el.dataset.id = flower.id;

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgEl.setAttribute('width',W); svgEl.setAttribute('height',H);
  svgEl.innerHTML = buildFlowerSVG(flower.dna, 100, W, H);
  el.appendChild(svgEl);

  // tooltip
  const tip = document.createElement('div');
  tip.className = 'signpost';
  tip.innerHTML = `<strong>${flower.topic}</strong><br><small>${flower.date}</small>`;
  el.appendChild(tip);

  document.getElementById('meadow').appendChild(el);
}

// ═══════════════════════════════════════════════════════
//  BLOOM BURST & PARTICLES
// ═══════════════════════════════════════════════════════
function showBloomBurst(topic, legendary) {
  const el = document.getElementById('bloom-burst');
  const inner = document.getElementById('bloom-burst-inner');
  inner.textContent = legendary ? `✨ Legendary Bloom! ✨\n"${topic}"` : `🌸 Bloomed!\n"${topic}"`;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

function spawnParticles() {
  const container = document.getElementById('particles');
  const colors = [session.dna.petalColor, session.dna.petalColor2, '#ffd6a5','#c3b1e1'];
  for(let i=0;i<20;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 6+Math.random()*10;
    const angle = Math.random()*Math.PI*2;
    const dist  = 80+Math.random()*160;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:50%;top:50%;margin-left:${-size/2}px;margin-top:${-size/2}px;
      --tx:translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px);
      animation-delay:${Math.random()*0.3}s;
      opacity:0.85;
    `;
    container.appendChild(p);
    setTimeout(()=>p.remove(), 1600);
  }
}

// ═══════════════════════════════════════════════════════
//  CAMERA & NAVIGATION
// ═══════════════════════════════════════════════════════
const SPEED = 6;
const ZOOM = 1.6;
function applyCamera() {
  camera.x = Math.max(0, Math.min(4000, camera.x));
  camera.y = Math.max(0, Math.min(4000, camera.y));
  const vw = window.innerWidth, vh = window.innerHeight;
  const tx = -(camera.x * ZOOM - vw/2);
  const ty = -(camera.y * ZOOM - vh/2);
  document.getElementById('meadow').style.transform = `translate(${tx}px,${ty}px) scale(${ZOOM})`;
  document.getElementById('coords').textContent = `${Math.round(camera.x)}, ${Math.round(camera.y)}`;
}

function moveCamera() {
  if(keys['ArrowLeft']||keys['a']||keys['A']) camera.x -= SPEED;
  if(keys['ArrowRight']||keys['d']||keys['D']) camera.x += SPEED;
  if(keys['ArrowUp']||keys['w']||keys['W']) camera.y -= SPEED;
  if(keys['ArrowDown']||keys['s']||keys['S']) camera.y += SPEED;
  applyCamera();
  requestAnimationFrame(moveCamera);
}

document.addEventListener('keydown', e => {
  const typing = document.activeElement === document.getElementById('topic-input');
  if(typing) return;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','d','w','s','A','D','W','S'].includes(e.key)){
    e.preventDefault();
    keys[e.key] = true;
  }
  if(e.key==='p'||e.key==='P') togglePhotoMode();
  if(e.key==='Escape') { if(photoMode) togglePhotoMode(); }
});
document.addEventListener('keyup', e => { if(document.activeElement !== document.getElementById('topic-input')) delete keys[e.key]; });

function recenter() {
  camera = { x:2000, y:2000 };
  applyCamera();
}

// ═══════════════════════════════════════════════════════
//  PHOTO MODE
// ═══════════════════════════════════════════════════════
function togglePhotoMode() {
  photoMode = !photoMode;
  document.getElementById('ui').classList.toggle('hidden', photoMode);
  document.getElementById('flower-count').classList.toggle('hidden', photoMode);
  document.getElementById('crosshair').style.opacity = photoMode?'0':'0.35';
  document.getElementById('photo-hint').classList.toggle('show', photoMode);
}

document.getElementById('bloom-burst').addEventListener('click', ()=>{ if(photoMode) togglePhotoMode(); });
document.getElementById('photo-hint').addEventListener('click', ()=>{ if(photoMode) togglePhotoMode(); });

// ═══════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════
function saveMeadow() {
  localStorage.setItem('studyMeadow', JSON.stringify(meadow));
}

function loadMeadow() {
  meadow.forEach(f => placeFlowerEl(f));
  updateFlowerCount();
}

function updateFlowerCount() {
  document.getElementById('flower-count').textContent = `🌸 ${meadow.length} flower${meadow.length!==1?'s':''}`;
}

function resetSession() {
  session = { progress:0, dna: newDNA() };
  document.getElementById('topic-input').value = '';
  updateUI();
}

// ═══════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type='sine', dur=0.15, vol=0.12, delay=0) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain= ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime+delay);
    osc.frequency.exponentialRampToValueAtTime(freq*1.5, ctx.currentTime+delay+dur*0.3);
    gain.gain.setValueAtTime(0, ctx.currentTime+delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime+delay+0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+dur);
    osc.start(ctx.currentTime+delay);
    osc.stop(ctx.currentTime+delay+dur);
  } catch(e){}
}

function playSound(type) {
  const sounds = {
    watch:    [()=>playTone(440,'sine',0.12,0.1)],
    notes:    [()=>playTone(523,'sine',0.12,0.1), ()=>playTone(659,'sine',0.1,0.08,0.08)],
    practice: [()=>playTone(392,'triangle',0.08,0.1), ()=>playTone(523,'triangle',0.1,0.1,0.06), ()=>playTone(659,'triangle',0.12,0.08,0.12)],
  };
  sounds[type].forEach(fn=>fn());
}

function playBloom() {
  // ascending chime
  [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.35,0.13,i*0.12));
  // sparkle layer
  setTimeout(()=>{
    [1568,1865,2093].forEach((f,i)=>playTone(f,'sine',0.2,0.06,i*0.08));
  }, 500);
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  meadow = JSON.parse(localStorage.getItem('studyMeadow') || '[]');
  applyCamera();
  loadMeadow();
  updateUI();
  moveCamera();
});
</script>
